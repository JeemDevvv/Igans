<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users — Admin</title>
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-shell">
  <aside class="sidebar">
    <div class="sidebar-brand"><span>🍽</span><div><div class="brand-name">La Maison</div><div class="brand-role">Admin Panel</div></div></div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard.html" class="nav-item"><span>📊</span> Dashboard</a>
      <a href="/admin/orders.html" class="nav-item"><span>📋</span> Orders</a>
      <a href="/admin/menu-manage.html" class="nav-item"><span>🍛</span> Menu</a>
      <a href="/admin/users.html" class="nav-item active"><span>👥</span> Users</a>
      <a href="/admin/tables.html" class="nav-item"><span>🪑</span> Tables & QR</a>
      <a href="/admin/reports.html" class="nav-item"><span>📈</span> Reports</a>
      <a href="/admin/settings.html" class="nav-item"><span>⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-footer"><button class="btn btn-ghost btn-sm btn-block" onclick="logout()">Sign Out</button></div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div><h1 class="admin-page-title">Users</h1><p class="admin-page-sub">Manage staff and customer accounts</p></div>
      <button class="btn btn-primary" onclick="openAddUser()">+ Add User</button>
    </div>
    <div class="admin-table-wrap" style="padding-top:24px;">
      <div class="table-toolbar">
        <div class="search-input-wrap"><span>🔍</span><input type="text" id="search-users" placeholder="Search name or email..." oninput="filterUsers()"></div>
        <select class="sort-select" id="role-filter" onchange="filterUsers()">
          <option value="">All Roles</option>
          <option value="admin">Admin</option>
          <option value="kitchen">Kitchen</option>
          <option value="staff">Staff</option>
          <option value="customer">Customer</option>
        </select>
        <span id="user-count" style="font-size:0.85rem;color:var(--text-muted);"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Add user modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal" style="max-width:440px;">
    <div class="modal-header"><h2>Add User</h2><button class="modal-close" onclick="closeAddUser()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Full Name *</label><input type="text" id="u-name" class="form-control"></div>
      <div class="form-group"><label class="form-label">Email *</label><input type="email" id="u-email" class="form-control"></div>
      <div class="form-group"><label class="form-label">Password *</label><input type="password" id="u-pass" class="form-control" placeholder="Min 6 characters"></div>
      <div class="form-group">
        <label class="form-label">Role *</label>
        <select id="u-role" class="form-control">
          <option value="customer">Customer</option>
          <option value="staff">Staff</option>
          <option value="kitchen">Kitchen</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddUser()">Cancel</button>
      <button class="btn btn-primary" onclick="addUser()">Add User</button>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
requireRole('admin');
let allUsers = [];

async function loadUsers() {
  const data = await apiFetch('/admin/users');
  allUsers = data.data;
  filterUsers();
}

function filterUsers() {
  const q = document.getElementById('search-users').value.toLowerCase();
  const role = document.getElementById('role-filter').value;
  let users = allUsers;
  if (q) users = users.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q));
  if (role) users = users.filter(u => u.role === role);
  document.getElementById('user-count').textContent = `${users.length} user${users.length !== 1 ? 's' : ''}`;
  const roleIcons = { admin: '⚙️', kitchen: '👨‍🍳', staff: '🧑‍💼', customer: '👤' };
  const me = Session.getUser();
  document.getElementById('users-tbody').innerHTML = users.length === 0
    ? `<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-muted);">No users found</td></tr>`
    : users.map(u => `<tr>
        <td><div style="display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;background:var(--primary);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;">${u.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
          <span style="font-weight:600;">${u.name}</span></div></td>
        <td style="color:var(--text-muted);">${u.email}</td>
        <td><span class="badge badge-primary">${roleIcons[u.role] || ''} ${u.role}</span></td>
        <td style="font-size:0.82rem;color:var(--text-muted);">${new Date(u.createdAt).toLocaleDateString()}</td>
        <td>${u._id !== me?.id ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${u._id}','${u.name}')">Delete</button>` : '<span style="font-size:0.8rem;color:var(--text-muted);">You</span>'}</td>
      </tr>`).join('');
}

async function deleteUser(id, name) {
  if (!confirm(`Delete user "${name}"?`)) return;
  try {
    await apiFetch(`/admin/users/${id}`, { method: 'DELETE' });
    showToast('User deleted');
    loadUsers();
  } catch(e) { showToast(e.message, 'error'); }
}

function openAddUser() { ['u-name','u-email','u-pass'].forEach(id => document.getElementById(id).value = ''); document.getElementById('user-modal').classList.add('active'); }
function closeAddUser() { document.getElementById('user-modal').classList.remove('active'); }

async function addUser() {
  const name = document.getElementById('u-name').value.trim();
  const email = document.getElementById('u-email').value.trim();
  const password = document.getElementById('u-pass').value;
  const role = document.getElementById('u-role').value;
  if (!name || !email || !password) { showToast('All fields required', 'error'); return; }
  try {
    await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ name, email, password, role }) });
    showToast('User added!');
    closeAddUser();
    loadUsers();
  } catch(e) { showToast(e.message, 'error'); }
}

document.addEventListener('DOMContentLoaded', loadUsers);
</script>
</body>
</html>
