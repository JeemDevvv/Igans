<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="css/favicon.jpg">
<title>Order Type — Igan's Budbod House</title>
<link rel="stylesheet" href="css/main.css">
<style>
body {
  height: 100vh; display: flex; flex-direction: column;
  background: var(--bg); overflow: hidden;
}
.hero {
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
  padding: 24px 20px; text-align: center; color: white;
  flex-shrink: 0;
}
.hero h1 { font-size: 1.8rem; color: white; margin-bottom: 4px; }
.hero p { opacity: 0.8; font-size: 0.9rem; }
.table-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.15); color: white;
  padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;
  margin-top: 10px; font-weight: 500;
}

.choices-section {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 20px; overflow: hidden;
}
.choices-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; max-width: 600px; width: 100%;
}
.choice-card {
  background: rgba(255, 255, 255, 0.05); 
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 2px solid var(--border);
  border-radius: 16px; padding: 24px 20px; text-align: center;
  cursor: pointer; transition: all 0.25s;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.choice-card:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
.choice-card.selected { border-color: var(--accent); background: rgba(233, 196, 106, 0.1); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.choice-card.selected::after {
  content: '✓'; position: absolute; top: 12px; right: 12px;
  width: 24px; height: 24px; background: var(--accent); color: #1C1008;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 800;
}
.choice-icon { font-size: 3rem; margin-bottom: 12px; display: block; line-height: 1; }
.choice-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: #FFF; margin-bottom: 6px; }
.choice-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }
.choice-tag {
  display: inline-block; margin-top: 10px;
  background: rgba(233,196,106,0.1); color: var(--accent);
  padding: 3px 10px; border-radius: 10px; font-size: 0.72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.proceed-area { text-align: center; padding: 0 20px 32px; flex-shrink: 0; }
#proceed-btn { min-width: 260px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(214,40,40,0.3); }

@media (max-width: 520px) {
  .choices-grid { grid-template-columns: 1fr; max-width: 280px; gap: 12px; }
  .choice-card { padding: 16px 12px; }
  .choice-icon { font-size: 2.2rem; margin-bottom: 8px; }
  .choice-title { font-size: 1.1rem; margin-bottom: 4px; }
  .choice-desc { font-size: 0.75rem; }
  .hero { padding: 20px 16px; }
  .hero h1 { font-size: 1.5rem; }
  .proceed-area { padding-bottom: 24px; }
  #proceed-btn { font-size: 0.9rem; padding: 12px 20px; }
}
</style>
</head>
<body>
<div class="hero">
  <h1>Welcome!</h1>
  <p>How would you like to enjoy your meal today?</p>
  <div id="table-badge" class="table-badge" style="display:none;">Seated at Table <strong id="table-display"></strong></div>
</div>

<div class="choices-section">
  <div class="choices-grid">
    <div class="choice-card" id="dine-in-card" onclick="selectType('dine-in', this)">
      <div class="choice-icon" style="color:var(--accent);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"></path><path d="M12 12m-5 0a5 5 0 1 0 10 0a5 5 0 1 0 -10 0"></path><path d="M12 7v5l3 3"></path></svg>
      </div>
      <div class="choice-title">Dine In</div>
      <div class="choice-desc">Enjoy your meal at your table. Your order will be brought directly to you.</div>
      <span class="choice-tag">Table Service</span>
    </div>
    <div class="choice-card" id="take-out-card" onclick="selectType('take-out', this)">
      <div class="choice-icon" style="color:var(--accent);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z"></path><path d="M9 10h6"></path><path d="M10 14h4"></path></svg>
      </div>
      <div class="choice-title">Take Out</div>
      <div class="choice-desc">Order your food to go. Pick it up at the counter when it's ready.</div>
      <span class="choice-tag">Counter Pickup</span>
    </div>
  </div>
</div>

<div class="proceed-area">
  <button class="btn btn-primary btn-lg" id="proceed-btn" onclick="proceed()" disabled>
    Browse Menu →
  </button>
  <p style="margin-top:12px;font-size:0.82rem;color:var(--text-light);">Select an option above to continue</p>
</div>

<script src="js/auth.js"></script>
<script>
requireRole('customer');
let selectedType = null;
const tableNum = Session.getTable();

if (tableNum) {
  document.getElementById('table-badge').style.display = 'inline-flex';
  document.getElementById('table-display').textContent = tableNum;
  // Auto-select dine-in if table is present
  selectType('dine-in', document.getElementById('dine-in-card'));
}

function selectType(type, card) {
  selectedType = type;
  document.querySelectorAll('.choice-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  const btn = document.getElementById('proceed-btn');
  btn.disabled = false;
  btn.textContent = type === 'dine-in' ? '🪑 Browse Menu (Dine In) →' : '🥡 Browse Menu (Take Out) →';
  // If take-out is chosen, clear table number
  if (type === 'take-out') sessionStorage.removeItem('tableNumber');
  else if (tableNum) sessionStorage.setItem('tableNumber', tableNum);
}

function proceed() {
  if (!selectedType) return;
  sessionStorage.setItem('orderType', selectedType);
  window.location.href = 'menu.html';
}
</script>
</body>
</html>
