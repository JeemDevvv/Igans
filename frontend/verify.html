<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Location — La Maison</title>
<link rel="stylesheet" href="/css/main.css">
<style>
body {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #1C1008 0%, #3D1F0A 50%, #1C1008 100%);
  padding: 20px;
  position: relative; overflow: hidden;
}
body::before, body::after {
  content: ''; position: absolute; border-radius: 50%;
  background: rgba(200,68,10,0.08);
}
body::before { width: 600px; height: 600px; top: -200px; right: -200px; }
body::after  { width: 400px; height: 400px; bottom: -150px; left: -100px; }

.verify-card {
  background: rgba(253,250,246,0.97);
  border-radius: 24px;
  padding: 48px 40px;
  max-width: 460px; width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  position: relative; z-index: 1;
  animation: fadeIn 0.5s ease;
}
.restaurant-logo {
  font-family: var(--font-display);
  font-size: 2rem; font-weight: 700;
  color: var(--primary);
  margin-bottom: 8px;
}
.restaurant-subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 40px; }

.location-icon-wrap {
  width: 96px; height: 96px; margin: 0 auto 32px;
  border-radius: 50%; background: rgba(200,68,10,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem; position: relative;
}
.location-pulse {
  position: absolute; inset: -8px; border-radius: 50%;
  border: 2px solid rgba(200,68,10,0.3);
  animation: pulse-ring 2s ease-out infinite;
}
.location-pulse-2 {
  position: absolute; inset: -16px; border-radius: 50%;
  border: 2px solid rgba(200,68,10,0.15);
  animation: pulse-ring 2s ease-out infinite 0.4s;
}
@keyframes pulse-ring {
  0% { transform: scale(0.9); opacity: 1; }
  100% { transform: scale(1.3); opacity: 0; }
}

.verify-title { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.verify-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 32px; }

.table-chip {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(200,68,10,0.1); color: var(--primary);
  padding: 8px 18px; border-radius: 20px;
  font-weight: 600; font-size: 0.9rem; margin-bottom: 28px;
}

.status-area { margin: 24px 0; min-height: 60px; }
.status-message {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; border-radius: var(--radius-sm);
  font-size: 0.88rem; text-align: left;
}
.status-message.checking { background: var(--info-bg); color: var(--info); }
.status-message.success  { background: var(--success-bg); color: var(--success); }
.status-message.error    { background: var(--danger-bg); color: var(--danger); }
.status-message.warning  { background: var(--warning-bg); color: var(--warning); }
.status-msg-text { flex: 1; }

.progress-bar {
  height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 16px 0;
}
.progress-fill {
  height: 100%; background: var(--primary); border-radius: 2px;
  transition: width 0.5s ease; width: 0%;
}

.coords-info {
  font-size: 0.78rem; color: var(--text-light);
  background: #F8F2EC; padding: 10px 14px; border-radius: var(--radius-sm);
  margin-top: 12px; display: none;
}
</style>
</head>
<body>
<div class="verify-card">
  <div class="restaurant-logo">🍽 La Maison</div>
  <div class="restaurant-subtitle">Fine Filipino Dining Experience</div>

  <div class="location-icon-wrap">
    <div class="location-pulse"></div>
    <div class="location-pulse-2"></div>
    📍
  </div>

  <h2 class="verify-title">Location Verification</h2>
  <p class="verify-desc">To place an order, we need to confirm you're inside the restaurant. Please allow location access when prompted.</p>

  <div id="table-chip" class="table-chip" style="display:none;">🪑 Table <span id="table-num"></span></div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="status-area">
    <div class="status-message" id="status-box" style="display:none;"></div>
    <div class="coords-info" id="coords-info"></div>
  </div>

  <button class="btn btn-primary btn-block btn-lg" id="verify-btn" onclick="startVerification()">
    📍 Verify My Location
  </button>
  <p style="margin-top:16px; font-size:0.8rem; color:var(--text-light);">Your location data is only used to verify access and is never stored.</p>
</div>

<script>
const tableNum = new URLSearchParams(location.search).get('table');
if (tableNum) {
  sessionStorage.setItem('tableNumber', tableNum);
  document.getElementById('table-chip').style.display = 'inline-flex';
  document.getElementById('table-num').textContent = tableNum;
}

function setProgress(pct) { document.getElementById('progress').style.width = pct + '%'; }

function showStatus(type, icon, msg) {
  const box = document.getElementById('status-box');
  box.style.display = 'flex';
  box.className = 'status-message ' + type;
  box.innerHTML = `<span style="font-size:1.3rem;">${icon}</span><span class="status-msg-text">${msg}</span>`;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function startVerification() {
  const btn = document.getElementById('verify-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Checking location...';
  setProgress(20);
  showStatus('checking', '🔄', 'Requesting location permission...');

  try {
    setProgress(40);
    const settingsRes = await fetch('/api/settings');
    const settingsData = await settingsRes.json();
    const { latitude, longitude, allowedRadiusMeters, restaurantName } = settingsData.data;
    setProgress(60);
    showStatus('checking', '📡', 'Getting your GPS coordinates...');

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setProgress(85);
        const { latitude: userLat, longitude: userLon, accuracy } = pos.coords;
        const dist = haversine(userLat, userLon, latitude, longitude);
        const distM = Math.round(dist);

        document.getElementById('coords-info').style.display = 'block';
        document.getElementById('coords-info').textContent =
          `Your position: ${userLat.toFixed(5)}, ${userLon.toFixed(5)} · Accuracy: ±${Math.round(accuracy)}m · Distance to restaurant: ${distM}m`;

        if (dist <= allowedRadiusMeters) {
          setProgress(100);
          showStatus('success', '✅', `Location verified! You are ${distM}m from ${restaurantName}. Redirecting...`);
          setTimeout(() => { window.location.href = '/login.html'; }, 1500);
        } else {
          setProgress(100);
          showStatus('error', '🚫', `Access denied. You are ${distM}m away from the restaurant (max: ${allowedRadiusMeters}m). You must be inside the restaurant to use this ordering system.`);
          btn.disabled = false;
          btn.innerHTML = '📍 Try Again';
        }
      },
      (err) => {
        setProgress(0);
        const msgs = { 1: 'Location permission denied. Please allow location access in your browser settings.', 2: 'Location unavailable. Please try again.', 3: 'Location request timed out. Please try again.' };
        showStatus('warning', '⚠️', msgs[err.code] || 'Could not get your location.');
        btn.disabled = false;
        btn.innerHTML = '📍 Try Again';

        // DEV MODE: bypass for testing
        if (confirm('DEV MODE: Location blocked. Bypass for testing?')) {
          window.location.href = '/login.html';
        }
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  } catch (err) {
    showStatus('error', '❌', 'Server error: ' + err.message);
    btn.disabled = false;
    btn.innerHTML = '📍 Verify My Location';
  }
}
</script>
</body>
</html>
