<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="css/favicon.jpg">
<title>Order Status — La Maison</title>
<link rel="stylesheet" href="css/main.css">
<style>
/* Use global background from main.css */
.status-page { max-width: 650px; margin: 0 auto; padding: 48px 24px; }
.order-card { 
  background: rgba(255, 255, 255, 0.05); 
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-lg); 
  border: 1px solid var(--border); 
  padding: 40px; 
  text-align: center; 
  box-shadow: var(--shadow-lg); 
  margin-bottom: 24px; 
}
.order-number { font-size: 0.9rem; color: var(--accent); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.order-id-display { font-family: var(--font-display); font-size: 1.8rem; color: #FFF; margin-bottom: 32px; font-weight: 800; }

/* Progress Steps */
.progress-steps { display: flex; align-items: flex-start; justify-content: center; gap: 0; margin: 40px 0; position: relative; }
.progress-steps::before { content:''; position:absolute; top: 28px; left: 12%; right: 12%; height: 4px; background: rgba(255,255,255,0.1); z-index: 0; border-radius: 2px; }
.progress-track { position:absolute; top: 28px; height: 4px; background: var(--accent); z-index: 1; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2px; }
.step { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; position: relative; z-index: 2; }
.step-circle {
  width: 56px; height: 56px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; transition: all 0.4s ease;
  backdrop-filter: blur(4px);
}
.step-circle.active { border-color: var(--accent); background: rgba(233,196,106,0.1); box-shadow: 0 0 20px rgba(233,196,106,0.2); }
.step-circle.done { border-color: var(--success); background: var(--success); color: white; }
.step-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-align: center; }
.step-label.active { color: var(--accent); }
.step-label.done { color: var(--success); }

.status-hero { font-size: 4rem; margin-bottom: 12px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
.status-text { font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 10px; color: #FFF; font-weight: 700; }
.status-sub { color: var(--text-muted); font-size: 1rem; }
.timer-display { margin: 32px 0; padding: 24px; background: rgba(233,196,106,0.08); border: 1px solid rgba(233,196,106,0.15); border-radius: var(--radius-sm); }
.timer-label { font-size: 0.85rem; color: var(--accent); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
.timer-value { font-size: 2.2rem; font-weight: 800; color: #FFF; font-family: var(--font-display); }

.items-list { text-align: left; background: rgba(0,0,0,0.2); padding: 24px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
.items-list h4 { font-size: 0.9rem; color: var(--accent); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
.order-item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.95rem; color: #FFF; }
.order-item-row:last-child { border-bottom: none; }

.action-bar { display: flex; gap: 16px; margin-top: 32px; justify-content: center; }
.navbar-actions { display: flex; align-items: center; gap: 10px; }

@media (max-width: 768px) {
  .status-page { padding: 24px 16px; }
  .order-card { padding: 24px; }
  .progress-steps { margin: 24px 0; }
  .step-circle { width: 48px; height: 48px; font-size: 1.3rem; }
  .step-label { font-size: 0.75rem; }
  .status-hero { font-size: 3rem; }
  .status-text { font-size: 1.5rem; }
  .timer-display { padding: 16px; }
  .timer-value { font-size: 1.8rem; }
  .action-bar { flex-direction: column; }
}
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">Igan's Budbod House</div>
  <div class="navbar-actions">
    <button class="btn btn-ghost btn-sm" onclick="window.location.href='menu.html'">+ New Order</button>
    <div id="nav-user"></div>
  </div>
</nav>

<div class="status-page">
  <div id="loading" style="text-align:center;padding:60px 20px;">
    <div class="spinner" style="width:40px;height:40px;margin:0 auto 16px;"></div>
    <p style="color:var(--text-muted);">Loading your order...</p>
  </div>

  <div id="order-content" style="display:none;">
    <div class="order-card">
      <div class="order-number">Order Number</div>
      <div class="order-id-display" id="order-num-display"></div>

      <!-- Status Icon & Text -->
      <div class="status-hero" id="status-hero"></div>
      <div class="status-text" id="status-text"></div>
      <div class="status-sub" id="status-sub"></div>

      <!-- Progress Steps -->
      <div class="progress-steps">
        <div class="progress-track" id="prog-track"></div>
        <div class="step" id="step-pending">
          <div class="step-circle" id="sc-pending">📋</div>
          <div class="step-label">Pending</div>
        </div>
        <div class="step" id="step-preparing">
          <div class="step-circle" id="sc-preparing">👨‍🍳</div>
          <div class="step-label">Preparing</div>
        </div>
        <div class="step" id="step-ready">
          <div class="step-circle" id="sc-ready">✅</div>
          <div class="step-label">Ready</div>
        </div>
        <div class="step" id="step-served">
          <div class="step-circle" id="sc-served">🎉</div>
          <div class="step-label">Served</div>
        </div>
      </div>

      <div class="timer-display">
        <div class="timer-label">Time since order placed</div>
        <div class="timer-value" id="timer-val">0:00</div>
      </div>
    </div>

    <!-- Order details -->
    <div class="card card-padded">
      <div class="items-list">
        <h4>Your Items</h4>
        <div id="items-detail"></div>
        <div style="display:flex;justify-content:space-between;padding-top:12px;font-weight:700;font-size:0.95rem;">
          <span>Total Paid</span>
          <span id="total-display" style="color:var(--primary);"></span>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn btn-outline btn-block refresh-btn" onclick="refreshOrder()">
        <span class="refresh-icon" id="refresh-icon">↻</span> Refresh Status
      </button>
      <button class="btn btn-ghost btn-block" onclick="window.location.href='/frontend/menu.html'">Order More</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
let orderId = Session.getOrderId();
let orderCreatedAt = null;
let timerInterval;

const STATUS_CONFIG = {
  pending:   { hero: '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>', text: 'Order Received', sub: 'Your order has been sent to the kitchen. Hang tight!', trackPct: '0%' },
  preparing: { hero: '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent);"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6v-7.13z"></path><line x1="6" y1="17" x2="18" y2="17"></line><path d="M12 21v-4"></path></svg>', text: 'Cooking in Progress', sub: 'Our chefs are preparing your delicious meal!', trackPct: '33%' },
  ready:     { hero: '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent);"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>', text: 'Order Ready!', sub: 'Your food is ready! Our staff will bring it to you shortly.', trackPct: '66%' },
  served:    { hero: '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--success);"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>', text: 'Enjoy Your Meal!', sub: 'Your order has been served. Bon appétit!', trackPct: '100%' },
  cancelled: { hero: '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--danger);"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>', text: 'Order Cancelled', sub: 'This order was cancelled. Please contact staff for assistance.', trackPct: '0%' }
};

const STEPS = ['pending', 'preparing', 'ready', 'served'];

document.addEventListener('DOMContentLoaded', async () => {
  if (!orderId) {
    const params = new URLSearchParams(location.search);
    orderId = params.get('id');
  }
  if (!orderId) { window.location.href = 'menu.html'; return; }
  await loadOrder();
  setInterval(loadOrder, 12000);
});

async function loadOrder() {
  try {
    const data = await apiFetch(`/orders/${orderId}`);
    const order = data.data;
    orderCreatedAt = order.createdAt;
    renderOrder(order);
    startTimer();
  } catch (e) {
    document.getElementById('loading').innerHTML = `<div class="empty-state"><div class="icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></div><h3>Could not load order</h3><p>${e.message}</p></div>`;
  }
}

function renderOrder(order) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('order-content').style.display = 'block';

  document.getElementById('order-num-display').textContent = order.orderNumber;
  const cfg = STATUS_CONFIG[order.status] || STATUS_CONFIG.pending;
  document.getElementById('status-hero').innerHTML = cfg.hero;
  document.getElementById('status-text').textContent = cfg.text;
  document.getElementById('status-sub').textContent = cfg.sub;
  document.getElementById('prog-track').style.width = cfg.trackPct;

  // Update step circles
  const statusIdx = STEPS.indexOf(order.status);
  STEPS.forEach((s, i) => {
    const circle = document.getElementById(`sc-${s}`);
    const label = document.querySelector(`#step-${s} .step-label`);
    if (i < statusIdx) { circle.className = 'step-circle done'; circle.textContent = '✓'; label.className = 'step-label done'; }
    else if (i === statusIdx) { circle.className = 'step-circle active'; label.className = 'step-label active'; }
    else { circle.className = 'step-circle'; label.className = 'step-label'; }
  });

  // Ready pulse
  if (order.status === 'ready') {
    document.querySelector('.order-card').classList.add('pulse-ready');
  }

  // Items
  document.getElementById('items-detail').innerHTML = order.items.map(i =>
    `<div class="order-item-row"><span>${i.quantity}× ${i.name}</span><span>${formatCurrency(i.price * i.quantity)}</span></div>`
  ).join('');
  document.getElementById('total-display').textContent = formatCurrency(order.totalAmount);
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!orderCreatedAt) return;
    const diff = Math.floor((Date.now() - new Date(orderCreatedAt)) / 1000);
    const m = Math.floor(diff / 60), s = diff % 60;
    document.getElementById('timer-val').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }, 1000);
}

async function refreshOrder() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spinning');
  await loadOrder();
  setTimeout(() => icon.classList.remove('spinning'), 800);
}
</script>
</body>
</html>
